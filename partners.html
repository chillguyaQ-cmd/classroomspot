<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Partners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #001a33;
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(100, 200, 255, 0.8);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(100, 200, 255, 0.8), 0 0 20px rgba(100, 200, 255, 0.4);
      animation: floatRight linear infinite;
    }

    @keyframes floatRight {
      0% {
        transform: translateX(-10px);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateX(calc(100vw + 10px));
        opacity: 0;
      }
    }

    h1 {
      padding: 40px 20px 20px;
      text-align: center;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
      position: relative;
      z-index: 1;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      position: relative;
      z-index: 1;
    }

    .game-card {
      background: rgba(0, 30, 60, 0.7);
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .3s;
      overflow: hidden;
      position: relative;
      border: 2px solid rgba(100, 200, 255, 0.3);
      box-shadow: 0 0 15px rgba(100, 200, 255, 0.2);
    }

    .game-card:hover {
      background: rgba(0, 50, 100, 0.8);
      transform: scale(1.03);
      box-shadow: 0 0 25px rgba(100, 200, 255, 0.5);
      border-color: rgba(100, 200, 255, 0.6);
    }

    .game-card:active {
      transform: scale(.97);
    }

    .game-card img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    .game-name {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      user-select: none;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 12px;
      border-radius: 5px;
      white-space: nowrap;
    }

    .infinite-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      color: white;
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all .3s ease;
      display: block;
      margin: 40px auto;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      position: relative;
      z-index: 1;
    }

    .infinite-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .infinite-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
<div class="particles" id="particles"></div>
<h1>Partners</h1>
<div class="games-grid">
<div class="game-card" onclick="window.open('https://nikehub.org','_blank')">
  <img src="nikehub-screenshot.jpg" alt="NikeHub">
  <div class="game-name">NikeHub</div>
</div>
<div class="game-card" onclick="window.open('https://sites.google.com/view/blockmelmao','_blank')">
  <img src="unknownhub-screenshot.jpg" alt="Unknown Hub">
  <div class="game-name">Unknown Hub</div>
</div>
<div class="game-card" onclick="window.open('https://t9os.space','_blank')">
  <img src="t9os-screenshot.jpg" alt="T9OS">
  <div class="game-name">T9OS</div>
</div>
</div>

<script>
  const particlesContainer = document.getElementById('particles');
  const particleCount = 100;

  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + 'vw';
    particle.style.top = Math.random() * 100 + 'vh';
    particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
    particle.style.animationDelay = Math.random() * 5 + 's';
    particle.style.width = (Math.random() * 3 + 2) + 'px';
    particle.style.height = particle.style.width;
    particlesContainer.appendChild(particle);
  }
</script>
</body>
</html>
