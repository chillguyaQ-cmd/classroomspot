<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeLearn - Student Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none!important}
body{font-family:'Segoe UI',Roboto,sans-serif;color:#fff;min-height:100vh;overflow:hidden;background:#000}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
#cursor-dot{position:fixed;width:10px;height:10px;background:#00aaff;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);box-shadow:0 0 6px #00aaff,0 0 18px #00aaff,0 0 35px rgba(0,170,255,0.35);will-change:transform}
.topbar{position:fixed;top:0;left:0;width:100%;height:64px;background:rgba(0,6,28,0.97);border-bottom:2px solid #4285F4;display:flex;align-items:center;justify-content:center;gap:10px;z-index:100;backdrop-filter:blur(14px)}
.nav-icon{width:46px;height:46px;border-radius:10px;background:transparent;border:1.5px solid rgba(66,133,244,0.45);display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:#4285F4;position:relative}
.nav-icon:hover{background:rgba(66,133,244,0.18);border-color:#4285F4;color:#fff;transform:translateY(-2px);box-shadow:0 4px 16px rgba(66,133,244,0.3)}
.nav-icon.active{background:rgba(66,133,244,0.28);border-color:#4285F4;color:#fff;box-shadow:0 0 14px rgba(66,133,244,0.45)}
.nav-icon svg{width:22px;height:22px;display:block}
.nav-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:9px;color:#4285F4;font-weight:600;white-space:nowrap;opacity:0;transition:opacity 0.15s;letter-spacing:0.5px;text-transform:uppercase;pointer-events:none}
.nav-icon:hover .nav-label{opacity:1}
.main-content{margin-top:64px;width:100%;height:calc(100vh - 64px);overflow:hidden;position:relative;z-index:2}
.content-section{display:none;width:100%;height:100%;overflow:hidden}
.content-section.active{display:flex;flex-direction:column}
.home-section,.embedded-section{width:100%;height:100%}
.home-section iframe,.embedded-section iframe{width:100%;height:100%;border:none}
.games-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:rgba(0,6,28,0.92);border-bottom:1px solid #1e3a6e;flex-shrink:0;gap:16px}
.games-total{font-size:13px;color:#4285F4;font-weight:600;white-space:nowrap}
.games-search{padding:8px 18px;border-radius:22px;border:1.5px solid #4285F4;background:#060c24;color:white;font-size:14px;width:240px;outline:none;transition:border-color 0.2s}
.games-search:focus{border-color:#34A853}
.games-section{padding:18px 22px;overflow-y:auto;flex:1}
.games-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:11px}
.game-card{width:100%;aspect-ratio:1;border-radius:10px;overflow:hidden;background:rgba(0,10,40,0.8);border:1.5px solid #4285F4;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;position:relative;background-size:cover;background-position:center}
.game-card:hover{transform:translateY(-5px) scale(1.05);border-color:#34A853;box-shadow:0 8px 22px rgba(52,168,83,0.35)}
.game-card-title{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.92),transparent);color:white;padding:14px 6px 6px;font-size:10px;font-weight:600;text-align:center}
.game-modal{position:fixed;top:64px;left:0;right:0;bottom:0;background:#000;z-index:50;display:none;flex-direction:column}
.game-modal.show{display:flex}
.game-modal-header{background:#0e1232;border-bottom:2px solid #4285F4;padding:13px 28px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.game-modal-header h2{color:#4285F4;font-size:18px;font-weight:700}
.game-modal-header button{background:#4285F4;color:white;border:none;padding:7px 16px;border-radius:6px;font-weight:600;transition:all 0.2s}
.game-modal-header button:hover{background:#34A853}
.game-modal-content{flex:1;overflow:hidden}
.game-modal-content iframe{width:100%;height:100%;border:none}








.modal-input:focus{outline:none}




.movies-menu{display:flex;align-items:center;justify-content:center;gap:30px;width:100%;height:100%;background:rgba(0,0,0,0.55)}
.movies-btn{padding:20px 56px;font-size:20px;font-weight:700;border:2px solid #4285F4;border-radius:14px;background:rgba(66,133,244,0.14);color:#fff;text-transform:uppercase;transition:all 0.22s}
.movies-btn:hover{background:#4285F4;transform:translateY(-4px) scale(1.05)}
.movies-embed{display:flex;flex-direction:column;width:100%;height:100%}
.movies-embed-bar{display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(0,6,28,0.92);border-bottom:1px solid #1e3a6e;flex-shrink:0}
.movies-back-btn{padding:6px 16px;background:#4285F4;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600}
.movies-back-btn:hover{background:#34A853}
.movies-embed-label{font-size:13px;color:#4285F4;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.movies-frame{flex:1;border:none;width:100%;height:100%}
</style>
<base target="_blank">

</head>

    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h3l3 3 3-3h7a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-2 8H6V8h12v2zm0-4H6V4h12v2z"/></svg>

  <button class="nav-icon" onclick="showSection('apps',this)" title="Apps">

</div>

  <div class="content-section active" id="home">

<base target="_blank">
</head>
<body>
  <canvas id="starfield"></canvas>
  <header>ClassroomSpot Media</header>
  <div class="top-row">
    <div class="search-wrap">
      <input id="searchInput" placeholder="Search database..." autocomplete="off"/>
      <select id="ratingSelect">
        <option value="all">All Ratings</option>
        <option value="gpg">G / PG</option>
        <option value="pg13">PG-13</option>
        <option value="r">R</option>
        <option value="nc17">NC-17 / Other</option>
      </select>
    </div>
  </div>
  <div id="main"></div>
  <div id="loadingIndicator"><div class="text">LOADING DATA</div></div>
  <div id="modal">
    <div id="modalContent">
      <div id="modalRating">Rated: NR</div>
      <button id="closeModal" onclick="closeModal()">CLOSE</button>
      <div id="modalTitle"></div>
      <div class="modal-controls">
        <select id="seasonSelect" style="display:none;"></select>
        <select id="episodeSelect" style="display:none;"></select>
        <select id="sourceSelect"></select>
      </div>
      <div id="iframeWrap"><iframe id="modalIframe" allowfullscreen></iframe></div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('starfield'),ctx=canvas.getContext('2d');
    let width,height,stars=[];
    function initStars(){width=window.innerWidth;height=window.innerHeight;canvas.width=width;canvas.height=height;stars=[];for(let i=0;i<200;i++){stars.push({x:Math.random()*width,y:Math.random()*height,radius:Math.random()*1.5,vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.1,alpha:Math.random(),grayShift:Math.random()*0.5+0.5});}}
    function animateStars(){ctx.clearRect(0,0,width,height);stars.forEach(star=>{const g=100+star.grayShift*155;ctx.fillStyle='rgba('+g+','+g+','+g+','+star.alpha+')';ctx.beginPath();ctx.arc(star.x,star.y,star.radius,0,Math.PI*2);ctx.fill();star.x+=star.vx;star.y+=star.vy;if(star.x<0)star.x=width;if(star.x>width)star.x=0;if(star.y<0)star.y=height;if(star.y>height)star.y=0;});requestAnimationFrame(animateStars);}
    window.addEventListener('resize',initStars);initStars();animateStars();
    const API_KEY='3a73619bbb8fc6d47742d1b5b2b707b5';
    const baseURL='https://api.themoviedb.org/3';
    const main=document.getElementById('main');
    const searchInput=document.getElementById('searchInput');
    const ratingSelect=document.getElementById('ratingSelect');
    const modal=document.getElementById('modal');
    const modalTitle=document.getElementById('modalTitle');
    const modalRating=document.getElementById('modalRating');
    const modalIframe=document.getElementById('modalIframe');
    const sourceSelect=document.getElementById('sourceSelect');
    const seasonSelect=document.getElementById('seasonSelect');
    const episodeSelect=document.getElementById('episodeSelect');
    const loadingIndicator=document.getElementById('loadingIndicator');
    const FALLBACK_POSTER='https://via.placeholder.com/500x750/000/888888?text=No+Image';
    let currentItem=null,currentPage=1,loading=false,inSearch=false,annotatedCache=[];
    function certMatchesGroup(cert,group){if(!cert)return group==='all';cert=cert.trim().toUpperCase();if(group==='all')return true;if(group==='gpg')return['G','PG','TV-Y','TV-G','TV-Y7'].includes(cert);if(group==='pg13')return cert==='PG-13'||cert==='TV-14';if(group==='r')return cert==='R'||cert==='TV-MA';if(group==='nc17')return cert==='NC-17'||(!['G','PG','PG-13','R','TV-14','TV-MA','TV-PG','TV-G','TV-Y','TV-Y7'].includes(cert));return false;}
    async function getMovieCertification(id){try{const res=await fetch(baseURL+'/movie/'+id+'/release_dates?api_key='+API_KEY);const data=await res.json();if(!data.results)return null;const us=data.results.find(r=>r.iso_3166_1==='US')||data.results[0];if(!us||!us.release_dates||!us.release_dates.length)return null;return us.release_dates.find(d=>d.certification&&d.certification.trim())?.certification||null;}catch(e){return null;}}
    async function getTvCertification(id){try{const res=await fetch(baseURL+'/tv/'+id+'/content_ratings?api_key='+API_KEY);const data=await res.json();if(!data.results)return null;const us=data.results.find(r=>r.iso_3166_1==='US')||data.results[0];return(us&&us.rating)?us.rating:null;}catch(e){return null;}}
    function showLoading(show){loadingIndicator.style.display=show?'flex':'none';}
    async function fetchItems(type,page){try{const res=await fetch(baseURL+'/'+type+'/popular?api_key='+API_KEY+'&language=en-US&page='+page);const data=await res.json();return data.results||[];}catch(e){return[];}}
    async function searchItems(query){try{const res=await fetch(baseURL+'/search/multi?api_key='+API_KEY+'&language=en-US&query='+encodeURIComponent(query));const data=await res.json();return data.results||[];}catch(e){return[];}}
    async function annotateWithCerts(items){const annotated=[];for(let item of items){const already=annotatedCache.find(c=>c.id===item.id&&c.media_type===item.media_type);if(already){annotated.push(already);continue;}let cert=null;if(item.media_type==='tv'||item.first_air_date)cert=await getTvCertification(item.id);else cert=await getMovieCertification(item.id);const newItem=Object.assign({},item,{_cert:cert});annotated.push(newItem);}return annotated;}
    function renderAnnotatedItemsAppend(items){const selected=ratingSelect.value||'all';items.forEach(item=>{if(!certMatchesGroup(item._cert,selected))return;createCard(item);});}
    function renderAllFromCache(){const selected=ratingSelect.value||'all';main.innerHTML='';annotatedCache.forEach(item=>{if(!certMatchesGroup(item._cert,selected))return;createCard(item);});}
    async function loadItems(){if(loading||inSearch)return 0;loading=true;showLoading(true);try{const movies=await fetchItems('movie',currentPage);const shows=await fetchItems('tv',currentPage);const combined=[...movies,...shows];const annotated=await annotateWithCerts(combined);const newOnes=[];for(let it of annotated){const exists=annotatedCache.find(c=>c.id===it.id&&c.media_type===it.media_type);if(!exists){annotatedCache.push(it);newOnes.push(it);}}renderAnnotatedItemsAppend(newOnes);currentPage++;return newOnes.length;}catch(err){return 0;}finally{loading=false;showLoading(false);}}
    function createCard(item){const card=document.createElement('div');card.className='card';const imgPath=item.poster_path?'https://image.tmdb.org/t/p/w500'+item.poster_path:FALLBACK_POSTER;card.innerHTML='<div class="card-image"><img src="'+imgPath+'" alt="'+(item.title||item.name||'Poster')+'"><div class="play-overlay"><div class="play-button"></div></div></div><h4>'+(item.title||item.name||'Untitled')+'</h4>';card.addEventListener('click',()=>openModal(item));main.appendChild(card);}
    const tvSources=['https://player.vidify.top/embed/tv/\${id}/\${season}/\${episode}','https://vidsrc.xyz/embed/tv?tmdb=\${id}&season=\${season}&episode=\${episode}','https://player.vidsrc.co/embed/tv/\${id}/\${season}/\${episode}','https://player.autoembed.cc/embed/tv/\${id}/\${season}/\${episode}','https://vidsrc.icu/embed/tv/\${id}/\${season}/\${episode}','https://moviekex.online/embed/tv/\${id}/\${season}/\${episode}','https://vidsrc.cc/v2/embed/tv/\${id}/\${season}/\${episode}','https://moviesapi.club/tv/\${id}-\${season}-\${episode}','https://vidlink.pro/tv/\${id}/\${season}/\${episode}','https://embed.su/embed/tv/\${id}/\${season}/\${episode}','https://vidora.su/tv/\${id}/\${season}/\${episode}'];
    const movieSources=['https://player.vidify.top/embed/movie/\${id}','https://vidsrc.xyz/embed/movie?tmdb=\${id}','https://player.vidsrc.co/embed/movie/\${id}','https://player.autoembed.cc/embed/movie/\${id}','https://vidsrc.icu/embed/movie/\${id}','https://moviekex.online/embed/movie/\${id}','https://vidsrc.cc/v2/embed/movie/\${id}','https://moviesapi.club/movie/\${id}','https://vidlink.pro/movie/\${id}','https://embed.su/embed/movie/\${id}','https://vidora.su/movie/\${id}'];
    function displayModalRatingText(item){let cert=item._cert??null;if(cert){modalRating.textContent='Rated: '+cert;return;}modalRating.textContent='Rated: NR';(async()=>{let fetched=null;if(item.media_type==='tv'||item.first_air_date)fetched=await getTvCertification(item.id);else fetched=await getMovieCertification(item.id);const final=fetched||'NR';modalRating.textContent='Rated: '+final;const found=annotatedCache.find(c=>c.id===item.id&&c.media_type===item.media_type);if(found)found._cert=fetched;})();}
    function openModal(item){currentItem=item;modal.classList.add('active');modalTitle.textContent=item.title||item.name||'';seasonSelect.style.display='none';episodeSelect.style.display='none';sourceSelect.innerHTML='';displayModalRatingText(item);if((item.media_type==='tv')||item.first_air_date){fetch(baseURL+'/tv/'+item.id+'?api_key='+API_KEY).then(res=>res.json()).then(data=>{const seasons=data.seasons||[];seasonSelect.innerHTML='';seasons.forEach(s=>{if(s.season_number===0)return;const opt=document.createElement('option');opt.value=s.season_number;opt.text=s.name||'Season '+s.season_number;seasonSelect.appendChild(opt);});if(seasonSelect.options.length){seasonSelect.style.display='inline-block';seasonSelect.onchange=()=>loadEpisodes(item.id,seasonSelect.value);seasonSelect.selectedIndex=0;seasonSelect.dispatchEvent(new Event('change'));}}).catch(()=>{modalIframe.src='';});}else{movieSources.forEach(link=>{const opt=document.createElement('option');opt.value=link.replace('\${id}',item.id);try{opt.textContent=new URL(opt.value).hostname.replace('www.','');}catch(e){opt.textContent='source';}sourceSelect.appendChild(opt);});if(sourceSelect.options.length){sourceSelect.selectedIndex=0;modalIframe.src=sourceSelect.value;}else{modalIframe.src='';}}sourceSelect.onchange=()=>{modalIframe.src=sourceSelect.value;};}
    function loadEpisodes(tvId,seasonNum){fetch(baseURL+'/tv/'+tvId+'/season/'+seasonNum+'?api_key='+API_KEY).then(res=>res.json()).then(data=>{episodeSelect.innerHTML='';(data.episodes||[]).forEach(ep=>{const opt=document.createElement('option');opt.value=ep.episode_number;opt.text=ep.name||'Episode '+ep.episode_number;episodeSelect.appendChild(opt);});if(episodeSelect.options.length){episodeSelect.style.display='inline-block';episodeSelect.onchange=()=>updateTvIframe(tvId,seasonNum,episodeSelect.value);episodeSelect.selectedIndex=0;episodeSelect.dispatchEvent(new Event('change'));}else{modalIframe.src='';}}).catch(()=>{modalIframe.src='';});}
    function updateTvIframe(id,season,episode){sourceSelect.innerHTML='';tvSources.forEach(link=>{const opt=document.createElement('option');opt.value=link.replace('\${id}',id).replace('\${season}',season).replace('\${episode}',episode);try{opt.textContent=new URL(opt.value).hostname.replace('www.','');}catch(e){opt.textContent='source';}sourceSelect.appendChild(opt);});if(sourceSelect.options.length){sourceSelect.selectedIndex=0;modalIframe.src=sourceSelect.value;}else{modalIframe.src='';}}
    function closeModal(){modal.classList.remove('active');setTimeout(()=>{modal.style.display='none';modalIframe.src='';},300);if(document.fullscreenElement)document.exitFullscreen?.();}
    let searchTimeout=null;
    async function performSearch(q){q=q.trim();main.innerHTML='';if(!q){inSearch=false;renderAllFromCache();return;}inSearch=true;showLoading(true);try{const results=await searchItems(q);const annotated=await annotateWithCerts(results);main.innerHTML='';const selected=ratingSelect.value||'all';annotated.forEach(item=>{if(!certMatchesGroup(item._cert,selected))return;createCard(item);});}catch(err){}finally{showLoading(false);}}
    searchInput.addEventListener('input',()=>{const v=searchInput.value;clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>performSearch(v),500);});
    ratingSelect.addEventListener('change',async()=>{if(inSearch){performSearch(searchInput.value||'');return;}renderAllFromCache();});
    document.addEventListener('keydown',(e)=>{if(e.key==='Escape'&&modal.classList.contains('active'))closeModal();});
    window.addEventListener('scroll',()=>{if(inSearch)return;if(window.innerHeight+window.scrollY>=document.body.offsetHeight-500){loadItems();}});
    async function init(){await loadItems();}init();
  <\/script>
</body>
</html>`;

function initTrees(){gs.trees=[];for(let i=0;i<50;i++)gs.trees.push({x:Math.random()*3000-1500,y:Math.random()*3000-1500,size:40+Math.random()*40});}
class Ent{constructor(x,y,sz,sp,img){this.x=x;this.y=y;this.size=sz;this.speed=sp;this.img=img;this.vx=0;this.vy=0;}
draw(ctx,cx,cy){const sx=this.x-cx+canvas.width/2,sy=this.y-cy+canvas.height/2;ctx.save();ctx.translate(sx,sy);if(this.vx<0)ctx.scale(-1,1);const aw=this.img.width/this.img.height;ctx.drawImage(this.img,-this.size*aw/2,-this.size/2,this.size*aw,this.size);ctx.restore();}
update(){this.x+=this.vx;this.y+=this.vy;this.x=Math.max(-1400,Math.min(1400,this.x));this.y=Math.max(-1400,Math.min(1400,this.y));}}
class Player extends Ent{constructor(){super(0,0,60,5,pImg);}
update(){this.vx=this.vy=0;if(gs.keys['w']||gs.keys['arrowup'])this.vy=-this.speed;if(gs.keys['s']||gs.keys['arrowdown'])this.vy=this.speed;if(gs.keys['a']||gs.keys['arrowleft'])this.vx=-this.speed;if(gs.keys['d']||gs.keys['arrowright'])this.vx=this.speed;if(this.vx&&this.vy){this.vx*=0.707;this.vy*=0.707;}super.update();}}
class Bot extends Ent{constructor(x,y,im){super(x,y,im?80:60,im?6:4,im?mImg:pImg);this.isMonster=im;this.cdt=0;this.tx=0;this.ty=0;}
update(pl,mn){const dx=pl.x-this.x,dy=pl.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
if(this.isMonster){if(dist<400&&!pl.isMonster){this.vx=(dx/dist)*this.speed;this.vy=(dy/dist)*this.speed;}else{this.cdt--;if(this.cdt<=0){this.tx=(Math.random()-0.5)*2000;this.ty=(Math.random()-0.5)*2000;this.cdt=60+Math.random()*60;}const td=Math.sqrt((this.tx-this.x)**2+(this.ty-this.y)**2);if(td>10){this.vx=((this.tx-this.x)/td)*this.speed*0.5;this.vy=((this.ty-this.y)/td)*this.speed*0.5;}}}
else{if(mn&&dist<300){this.vx=(-dx/dist)*this.speed*1.5;this.vy=(-dy/dist)*this.speed*1.5;}else{this.cdt--;if(this.cdt<=0){const a=Math.random()*Math.PI*2;this.vx=Math.cos(a)*this.speed;this.vy=Math.sin(a)*this.speed;this.cdt=30+Math.random()*60;}}}
super.update();}}
function initGame(){gs.player=new Player();gs.bots=[];gs.monster=null;const bc=5+gs.round*2;
if(gs.isMonster){gs.player.img=mImg;gs.player.size=80;gs.player.speed=6;document.getElementById('monsterOverlay').style.display='block';document.getElementById('roleDisplay').textContent='MONSTER';document.getElementById('roleDisplay').style.color='#f44336';for(let i=0;i<bc;i++){const a=(Math.PI*2*i)/bc,d=600+Math.random()*400;gs.bots.push(new Bot(Math.cos(a)*d,Math.sin(a)*d,false));}}
else{gs.player.img=skins[gs.selectedSkin].img;gs.player.size=60;gs.player.speed=5;document.getElementById('monsterOverlay').style.display='none';document.getElementById('roleDisplay').textContent='RUNNER';document.getElementById('roleDisplay').style.color='#4caf50';const mb=new Bot(800,800,true);gs.monster=mb;gs.bots.push(mb);for(let i=0;i<bc-1;i++){const a=(Math.PI*2*i)/(bc-1),d=400+Math.random()*300;gs.bots.push(new Bot(Math.cos(a)*d,Math.sin(a)*d,false));}gs.bots.push(gs.player);}
initTrees();gs.gameRunning=true;gameLoop();}
function checkCollisions(){if(gs.isMonster){for(let i=gs.bots.length-1;i>=0;i--){const b=gs.bots[i];if(Math.sqrt((gs.player.x-b.x)**2+(gs.player.y-b.y)**2)<50){gs.bots.splice(i,1);if(gs.bots.length===0){showVictory();return;}}}}
else if(gs.monster&&Math.sqrt((gs.player.x-gs.monster.x)**2+(gs.player.y-gs.monster.y)**2)<50)playerDied();}
function showVictory(){gs.gameRunning=false;document.getElementById('victoryMessage').style.display='block';if(gs.isMonster){gs.coins+=10;updateCoinDisplay();}setTimeout(()=>{document.getElementById('victoryMessage').style.display='none';gs.round++;gs.isMonster=(gs.round%3===0);updateRoundDisplay();initGame();},2000);}
function playerDied(){gs.gameRunning=false;document.getElementById('deathRound').textContent=gs.round;document.getElementById('deathCoins').textContent=gs.coins;document.getElementById('deathScreen').style.display='flex';}
function returnToMenu(){document.getElementById('deathScreen').style.display='none';document.getElementById('gameCanvas').style.display='none';document.getElementById('gameUI').style.display='none';document.getElementById('mainMenu').style.display='flex';gs.round=1;gs.isMonster=false;updateRoundDisplay();}
function gameLoop(){if(!gs.gameRunning)return;ctx.fillStyle='#1a472a';ctx.fillRect(0,0,canvas.width,canvas.height);gs.player.update();gs.camera.x=gs.player.x;gs.camera.y=gs.player.y;ctx.save();ctx.translate(canvas.width/2-gs.camera.x,canvas.height/2-gs.camera.y);ctx.fillStyle='#0d3320';ctx.fillRect(-1500,-1500,3000,3000);for(const t of gs.trees){ctx.fillStyle='#0f3d0f';ctx.beginPath();ctx.arc(t.x,t.y-t.size/2,t.size/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a3728';ctx.fillRect(t.x-8,t.y-10,16,25);}ctx.restore();for(const b of gs.bots){if(b!==gs.player)b.update(gs.player,gs.monster);b.draw(ctx,gs.camera.x,gs.camera.y);}gs.player.draw(ctx,gs.camera.x,gs.camera.y);checkCollisions();requestAnimationFrame(gameLoop);}
function updateRoundDisplay(){document.getElementById('roundDisplay').textContent=gs.round;document.getElementById('monsterRoundDisplay').textContent=(3-(gs.round%3))%3||3;}
function updateCoinDisplay(){document.getElementById('gameCoins').textContent=gs.coins;document.getElementById('shopCoins').textContent=gs.coins;}

function buySkin(id){if(gs.ownedSkins.includes(id)){gs.selectedSkin=id;initShop();return;}const skin=skins[id];if(gs.coins>=skin.price){gs.coins-=skin.price;gs.ownedSkins.push(id);gs.selectedSkin=id;updateCoinDisplay();initShop();}else alert('Not enough coins!');}

const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * pCanvas.width;
    this.y = init ? Math.random() * pCanvas.height : pCanvas.height + 5;
    this.size = Math.random() * 1.8 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.25;
    this.speedY = -(Math.random() * 0.5 + 0.15);
    this.alpha = Math.random() * 0.45 + 0.1;
    this.hue = 210 + Math.random() * 30;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.y < -8) this.reset(false);
  }
  draw() {
    pCtx.globalAlpha = this.alpha;
    pCtx.fillStyle = `hsl(${this.hue},90%,65%)`;
    pCtx.beginPath();
    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    pCtx.fill();
  }
}

for (let i = 0; i < 120; i++) particles.push(new Particle());

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  pCtx.globalAlpha = 1;
  particles.forEach(p => { p.update(); p.draw(); });
  pCtx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();

const cursorDot = document.getElementById('cursor-dot');
document.addEventListener('mousemove', e => {
  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top = e.clientY + 'px';
});

function showSection(id, btn) {
  document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'games') loadGames();
  if (id === 'apps') {
    const af = document.getElementById('appsFrame');
    if (!af.srcdoc) af.srcdoc = APPS_HTML;
  }
  if (id !== 'movies') {
    document.getElementById('moviesMenu').style.display = 'flex';
    document.getElementById('moviesEmbed').style.display = 'none';
    const mf = document.getElementById('moviesFrame');
    mf.removeAttribute('srcdoc');
    mf.src = '';
  }
}

function openGameInModal(name, htmlContent) {
  document.getElementById('gameTitle').textContent = name;
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('src');
  frame.srcdoc = htmlContent;
  document.getElementById('gameModal').classList.add('show');
}

function openGameUrl(name, url) {
  document.getElementById('gameTitle').textContent = name;
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('srcdoc');
  frame.src = url;
  document.getElementById('gameModal').classList.add('show');
}

function openNoahGame(g) {
  const win = window.open('about:blank', '_blank');
  if (!win) { window.open(g.url, '_blank'); return; }
  fetch(g.url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(t => { win.document.open(); win.document.write(t); win.document.close(); })
    .catch(() => {
      win.document.open();
      win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body,html{width:100%;height:100%;overflow:hidden}iframe{border:none;width:100vw;height:100vh}</style></head><body><iframe src="' + g.url + '" allowfullscreen allow="autoplay"></iframe></body></html>');
      win.document.close();
    });
}

function buildGrid(grid, customList, noahList, apiList) {
  grid.innerHTML = '';
  customList.forEach(g => {
    const card = makeCard(g.name, g.img);
    if (g.html) card.onclick = () => openGameInModal(g.name, g.html);
    else card.onclick = () => openGameUrl(g.name, g.url);
    grid.appendChild(card);
  });
  apiList.forEach(g => {
    const coverUrl = g.cover ? g.cover.replace('{COVER_URL}', COVER_BASE).replace('{HTML_URL}', HTML_BASE) : '';
    const gameUrl = g.url.replace('{HTML_URL}', HTML_BASE);
    const card = makeCard(g.name, coverUrl);
    card.onclick = () => openGameModalFetch(g.name, gameUrl);
    grid.appendChild(card);
  });
  noahList.forEach(g => {
    const card = makeCard(g.name, g.img);
    card.onclick = () => openNoahGame(g);
    grid.appendChild(card);
  });
  if (grid.children.length === 0) { grid.innerHTML = '<div>No games found.</div>'; }
}

function renderGames(apiList) { buildGrid(document.getElementById('gamesGrid'), CUSTOM_GAMES, NOAH_GAMES, apiList); }

function loadGames() {
  if (gamesLoaded) return;
  gamesLoaded = true;
  fetch(ZONES_URL + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      allApiGames = data.filter(g => !g.name.toLowerCase().includes('suggest') && !g.name.includes('[!]'));
      document.getElementById('gamesTotal').textContent = 'Total games: ' + (CUSTOM_GAMES.length + NOAH_GAMES.length + allApiGames.length);
      renderGames(allApiGames);
    })
    .catch(() => {
      document.getElementById('gamesTotal').textContent = 'Total games: ' + (CUSTOM_GAMES.length + NOAH_GAMES.length);
      renderGames([]);
    });
}

function searchGames(query) {
  const q = query.trim().toLowerCase();
  const fc = q ? CUSTOM_GAMES.filter(g => g.name.toLowerCase().includes(q)) : CUSTOM_GAMES;
  const fn = q ? NOAH_GAMES.filter(g => g.name.toLowerCase().includes(q)) : NOAH_GAMES;
  const fa = q ? allApiGames.filter(g => g.name.toLowerCase().includes(q)) : allApiGames;
  document.getElementById('gamesTotal').textContent = 'Total games: ' + (fc.length + fn.length + fa.length);
  buildGrid(document.getElementById('gamesGrid'), fc, fn, fa);
}

function makeCard(name, imgUrl) {
  const card = document.createElement('div');
  card.className = 'game-card';
  if (imgUrl) card.style.backgroundImage = 'url(' + imgUrl + ')';
  const title = document.createElement('div');
  title.className = 'game-card-title';
  title.textContent = name;
  card.appendChild(title);
  return card;
}

function openGameModalFetch(name, url) {
  document.getElementById('gameTitle').textContent = name;
  document.getElementById('gameModal').classList.add('show');
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('src');
  frame.srcdoc = '<div style="color:#4285F4;font-size:20px;display:flex;align-items:center;justify-content:center;height:100%;background:#000">Loading...</div>';
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => { frame.srcdoc = html; })
    .catch(() => { frame.srcdoc = '<div style="color:red;font-size:20px;display:flex;align-items:center;justify-content:center;height:100%;background:#000">Failed to load game.</div>'; });
}

function closeGameModal() {
  document.getElementById('gameModal').classList.remove('show');
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('srcdoc');
  frame.src = '';
}

function openMovies(type) {
  document.getElementById('moviesMenu').style.display = 'none';
  document.getElementById('moviesEmbed').style.display = 'flex';
  const frame = document.getElementById('moviesFrame');
  const label = document.getElementById('moviesBtnLabel');
  if (type === 'media') {
    label.textContent = 'TV / Movies';
    frame.removeAttribute('src');
    frame.srcdoc = MEDIA_HTML;
  } else {
    label.textContent = 'Live TV';
    frame.removeAttribute('srcdoc');
    frame.src = 'livetv.html';
  }
}

function closeMovies() {
  document.getElementById('moviesEmbed').style.display = 'none';
  document.getElementById('moviesMenu').style.display = 'flex';
  const mf = document.getElementById('moviesFrame');
  mf.removeAttribute('srcdoc');
  mf.src = '';
}



document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGameModal(); });
</script>
