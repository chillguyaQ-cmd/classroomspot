<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodeLearn - Student Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Roboto,sans-serif;color:#fff;min-height:100vh;overflow:hidden;background:#000}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
.topbar{position:fixed;top:0;left:0;width:100%;height:64px;background:rgba(0,6,28,0.97);border-bottom:2px solid #4285F4;display:flex;align-items:center;justify-content:center;gap:10px;z-index:100;backdrop-filter:blur(14px)}
.nav-icon{width:46px;height:46px;border-radius:10px;background:transparent;border:1.5px solid rgba(66,133,244,0.45);display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:#4285F4;position:relative}
.nav-icon:hover{background:rgba(66,133,244,0.18);border-color:#4285F4;color:#fff;transform:translateY(-2px);box-shadow:0 4px 16px rgba(66,133,244,0.3)}
.nav-icon.active{background:rgba(66,133,244,0.28);border-color:#4285F4;color:#fff;box-shadow:0 0 14px rgba(66,133,244,0.45)}
.nav-icon svg{width:22px;height:22px;display:block}
.nav-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);font-size:9px;color:#4285F4;font-weight:600;white-space:nowrap;opacity:0;transition:opacity 0.15s;letter-spacing:0.5px;text-transform:uppercase;pointer-events:none}
.nav-icon:hover .nav-label{opacity:1}
.main-content{margin-top:64px;width:100%;height:calc(100vh - 64px);overflow:hidden;position:relative;z-index:2}
.content-section{display:none;width:100%;height:100%;overflow:hidden}
.content-section.active{display:flex;flex-direction:column}
.home-section,.embedded-section{width:100%;height:100%}
.home-section iframe,.embedded-section iframe{width:100%;height:100%;border:none}
.games-topbar{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px 10px;background:transparent;flex-shrink:0;flex-wrap:wrap}
.games-title{font-size:36px;font-weight:900;color:#fff;text-align:center;width:100%;margin-bottom:4px;letter-spacing:2px;text-shadow:0 0 24px rgba(66,133,244,0.5)}
.games-total{font-size:12px;color:#7ab3f5;font-weight:600;white-space:nowrap;background:rgba(0,30,80,0.6);padding:5px 12px;border-radius:20px;border:1px solid rgba(66,133,244,0.3)}
.games-search{padding:8px 16px;border-radius:8px;border:1.5px solid rgba(66,133,244,0.45);background:rgba(0,10,40,0.8);color:white;font-size:13px;width:240px;outline:none;transition:border-color 0.2s}
.games-search::placeholder{color:#4a6a9e}
.games-search:focus{border-color:#4285F4}
.games-sort{padding:8px 12px;border-radius:8px;border:1.5px solid rgba(66,133,244,0.45);background:rgba(0,10,40,0.8);color:#ccc;font-size:13px;outline:none;cursor:pointer}
.games-section{padding:6px 10px 10px;overflow-y:auto;flex:1;position:relative}
#gamesParticleCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));grid-auto-rows:118px;gap:5px;position:relative;z-index:1}
.game-card{border-radius:10px;overflow:hidden;background:#0d1b2e;border:none;transition:transform 0.13s,box-shadow 0.13s;display:flex;flex-direction:column;cursor:pointer}
.game-card:hover{transform:scale(1.07);box-shadow:0 6px 20px rgba(66,133,244,0.45);z-index:10}
.game-card.featured{grid-column:span 3;grid-row:span 3}
.game-card-img{flex:1;min-height:0;width:100%;background-size:cover;background-position:center;background-color:#0d1b2e}
.game-card-title{height:22px;padding:3px 5px;font-size:10px;font-weight:700;text-align:center;color:#c8d8f5;background:#0b1525;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.game-card.featured .game-card-title{height:26px;font-size:12px;padding:4px 6px}
.game-modal{position:fixed;top:64px;left:0;right:0;bottom:0;background:#000;z-index:50;display:none;flex-direction:column}
.game-modal.show{display:flex}
.game-modal-header{background:#0e1232;border-bottom:2px solid #4285F4;padding:13px 28px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.game-modal-header h2{color:#4285F4;font-size:18px;font-weight:700}
.game-modal-header button{background:#4285F4;color:white;border:none;padding:7px 16px;border-radius:6px;font-weight:600;transition:all 0.2s}
.game-modal-header button:hover{background:#34A853}
.game-modal-content{flex:1;overflow:hidden}
.game-modal-content iframe{width:100%;height:100%;border:none}
.movies-menu{display:flex;align-items:center;justify-content:center;gap:30px;width:100%;height:100%;background:rgba(0,0,0,0.55)}
.movies-btn{padding:20px 56px;font-size:20px;font-weight:700;border:2px solid #4285F4;border-radius:14px;background:rgba(66,133,244,0.14);color:#fff;text-transform:uppercase;transition:all 0.22s}
.movies-btn:hover{background:#4285F4;transform:translateY(-4px) scale(1.05)}
.movies-embed{display:flex;flex-direction:column;width:100%;height:100%}
.movies-embed-bar{display:flex;align-items:center;gap:14px;padding:10px 20px;background:rgba(0,6,28,0.92);border-bottom:1px solid #1e3a6e;flex-shrink:0}
.movies-back-btn{padding:6px 16px;background:#4285F4;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600}
.movies-back-btn:hover{background:#34A853}
.movies-embed-label{font-size:13px;color:#4285F4;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.movies-frame{flex:1;border:none;width:100%;height:100%}
</style>
<base target="_blank">

<body>

<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
const pImg=new Image(),mImg=new Image(),bImg=new Image(),b3Img=new Image(),mbImg=new Image();
pImg.crossOrigin=mImg.crossOrigin=bImg.crossOrigin=b3Img.crossOrigin=mbImg.crossOrigin='anonymous';
pImg.src='https://tse2.mm.bing.net/th/id/OIP.89OCW3QR_4RuPGPzLorffwAAAA?pid=ImgDet&w=197&h=197&c=7&o=7&rm=3';
mImg.src='https://tse4.mm.bing.net/th/id/OIP.k0M8bXrS6QH-pzIFTnVVXgHaLG?pid=ImgDet&w=197&h=295&c=7&o=7&rm=3';
bImg.src='https://vignette.wikia.nocookie.net/simpsons/images/1/12/Bartman_Tapped_Out.png/revision/latest?cb=20151122175055';
b3Img.src='https://th.bing.com/th/id/OIP.pHOZGFOlqL5Va6SwwaQSLQHaEK?w=291&h=181&c=7&r=0&o=7&pid=1.7&rm=3';
mbImg.src='https://tse1.explicit.bing.net/th/id/OIP.WAoL4wWR3ePBTVrSQHXU9gAAAA?pid=ImgDet&w=165&h=350&c=7&o=7&rm=3';
let gs={coins:0,round:1,isMonster:false,selectedSkin:'default',ownedSkins:['default'],gameRunning:false,player:null,bots:[],monster:null,keys:{},camera:{x:0,y:0},trees:[]};
const skins={default:{name:'Default Bart',price:0,img:pImg},bartman:{name:'Bartman',price:60,img:bImg},bart3d:{name:'3D Bart',price:50,img:b3Img},mogbart:{name:'I Mog You Bart',price:100,img:mbImg}};
function initTrees(){gs.trees=[];for(let i=0;i<50;i++)gs.trees.push({x:Math.random()*3000-1500,y:Math.random()*3000-1500,size:40+Math.random()*40});}
class Ent{constructor(x,y,sz,sp,img){this.x=x;this.y=y;this.size=sz;this.speed=sp;this.img=img;this.vx=0;this.vy=0;}
draw(ctx,cx,cy){const sx=this.x-cx+canvas.width/2,sy=this.y-cy+canvas.height/2;ctx.save();ctx.translate(sx,sy);if(this.vx<0)ctx.scale(-1,1);const aw=this.img.width/this.img.height;ctx.drawImage(this.img,-this.size*aw/2,-this.size/2,this.size*aw,this.size);ctx.restore();}
update(){this.x+=this.vx;this.y+=this.vy;this.x=Math.max(-1400,Math.min(1400,this.x));this.y=Math.max(-1400,Math.min(1400,this.y));}}
class Player extends Ent{constructor(){super(0,0,60,5,pImg);}
update(){this.vx=this.vy=0;if(gs.keys['w']||gs.keys['arrowup'])this.vy=-this.speed;if(gs.keys['s']||gs.keys['arrowdown'])this.vy=this.speed;if(gs.keys['a']||gs.keys['arrowleft'])this.vx=-this.speed;if(gs.keys['d']||gs.keys['arrowright'])this.vx=this.speed;if(this.vx&&this.vy){this.vx*=0.707;this.vy*=0.707;}super.update();}}
class Bot extends Ent{constructor(x,y,im){super(x,y,im?80:60,im?6:4,im?mImg:pImg);this.isMonster=im;this.cdt=0;this.tx=0;this.ty=0;}
update(pl,mn){const dx=pl.x-this.x,dy=pl.y-this.y,dist=Math.sqrt(dx*dx+dy*dy);
if(this.isMonster){if(dist<400&&!pl.isMonster){this.vx=(dx/dist)*this.speed;this.vy=(dy/dist)*this.speed;}else{this.cdt--;if(this.cdt<=0){this.tx=(Math.random()-0.5)*2000;this.ty=(Math.random()-0.5)*2000;this.cdt=60+Math.random()*60;}const td=Math.sqrt((this.tx-this.x)**2+(this.ty-this.y)**2);if(td>10){this.vx=((this.tx-this.x)/td)*this.speed*0.5;this.vy=((this.ty-this.y)/td)*this.speed*0.5;}}}
else{if(mn&&dist<300){this.vx=(-dx/dist)*this.speed*1.5;this.vy=(-dy/dist)*this.speed*1.5;}else{this.cdt--;if(this.cdt<=0){const a=Math.random()*Math.PI*2;this.vx=Math.cos(a)*this.speed;this.vy=Math.sin(a)*this.speed;this.cdt=30+Math.random()*60;}}}
super.update();}}
function initGame(){gs.player=new Player();gs.bots=[];gs.monster=null;const bc=5+gs.round*2;
if(gs.isMonster){gs.player.img=mImg;gs.player.size=80;gs.player.speed=6;document.getElementById('monsterOverlay').style.display='block';document.getElementById('roleDisplay').textContent='MONSTER';document.getElementById('roleDisplay').style.color='#f44336';for(let i=0;i<bc;i++){const a=(Math.PI*2*i)/bc,d=600+Math.random()*400;gs.bots.push(new Bot(Math.cos(a)*d,Math.sin(a)*d,false));}}
else{gs.player.img=skins[gs.selectedSkin].img;gs.player.size=60;gs.player.speed=5;document.getElementById('monsterOverlay').style.display='none';document.getElementById('roleDisplay').textContent='RUNNER';document.getElementById('roleDisplay').style.color='#4caf50';const mb=new Bot(800,800,true);gs.monster=mb;gs.bots.push(mb);for(let i=0;i<bc-1;i++){const a=(Math.PI*2*i)/(bc-1),d=400+Math.random()*300;gs.bots.push(new Bot(Math.cos(a)*d,Math.sin(a)*d,false));}gs.bots.push(gs.player);}
initTrees();gs.gameRunning=true;gameLoop();}
function checkCollisions(){if(gs.isMonster){for(let i=gs.bots.length-1;i>=0;i--){const b=gs.bots[i];if(Math.sqrt((gs.player.x-b.x)**2+(gs.player.y-b.y)**2)<50){gs.bots.splice(i,1);if(gs.bots.length===0){showVictory();return;}}}}
else if(gs.monster&&Math.sqrt((gs.player.x-gs.monster.x)**2+(gs.player.y-gs.monster.y)**2)<50)playerDied();}
function showVictory(){gs.gameRunning=false;document.getElementById('victoryMessage').style.display='block';if(gs.isMonster){gs.coins+=10;updateCoinDisplay();}setTimeout(()=>{document.getElementById('victoryMessage').style.display='none';gs.round++;gs.isMonster=(gs.round%3===0);updateRoundDisplay();initGame();},2000);}
function playerDied(){gs.gameRunning=false;document.getElementById('deathRound').textContent=gs.round;document.getElementById('deathCoins').textContent=gs.coins;document.getElementById('deathScreen').style.display='flex';}
function returnToMenu(){document.getElementById('deathScreen').style.display='none';document.getElementById('gameCanvas').style.display='none';document.getElementById('gameUI').style.display='none';document.getElementById('mainMenu').style.display='flex';gs.round=1;gs.isMonster=false;updateRoundDisplay();}
function gameLoop(){if(!gs.gameRunning)return;ctx.fillStyle='#1a472a';ctx.fillRect(0,0,canvas.width,canvas.height);gs.player.update();gs.camera.x=gs.player.x;gs.camera.y=gs.player.y;ctx.save();ctx.translate(canvas.width/2-gs.camera.x,canvas.height/2-gs.camera.y);ctx.fillStyle='#0d3320';ctx.fillRect(-1500,-1500,3000,3000);for(const t of gs.trees){ctx.fillStyle='#0f3d0f';ctx.beginPath();ctx.arc(t.x,t.y-t.size/2,t.size/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a3728';ctx.fillRect(t.x-8,t.y-10,16,25);}ctx.restore();for(const b of gs.bots){if(b!==gs.player)b.update(gs.player,gs.monster);b.draw(ctx,gs.camera.x,gs.camera.y);}gs.player.draw(ctx,gs.camera.x,gs.camera.y);checkCollisions();requestAnimationFrame(gameLoop);}
function updateRoundDisplay(){document.getElementById('roundDisplay').textContent=gs.round;document.getElementById('monsterRoundDisplay').textContent=(3-(gs.round%3))%3||3;}
function updateCoinDisplay(){document.getElementById('gameCoins').textContent=gs.coins;document.getElementById('shopCoins').textContent=gs.coins;}
function showMainMenu(){document.getElementById('shop').style.display='none';document.getElementById('mainMenu').style.display='flex';}
function initShop(){const grid=document.getElementById('skinsGrid');grid.innerHTML='';for(const[id,skin]of Object.entries(skins)){const card=document.createElement('div');card.className='skin-card'+(gs.ownedSkins.includes(id)?' owned':'')+(gs.selectedSkin===id?' selected':'');const img=document.createElement('img');img.className='skin-img';img.src=skin.img.src;const name=document.createElement('div');name.className='skin-name';name.textContent=skin.name;const price=document.createElement('div');if(gs.ownedSkins.includes(id)){price.className='skin-owned-text';price.textContent=gs.selectedSkin===id?'SELECTED':'OWNED';}else{price.className='skin-price';price.textContent=skin.price+' Coins';}card.append(img,name,price);card.onclick=()=>buySkin(id);grid.appendChild(card);}updateCoinDisplay();}
function buySkin(id){if(gs.ownedSkins.includes(id)){gs.selectedSkin=id;initShop();return;}const skin=skins[id];if(gs.coins>=skin.price){gs.coins-=skin.price;gs.ownedSkins.push(id);gs.selectedSkin=id;updateCoinDisplay();initShop();}else alert('Not enough coins!');}
document.getElementById('playBtn').onclick=()=>{document.getElementById('mainMenu').style.display='none';document.getElementById('gameCanvas').style.display='block';document.getElementById('gameUI').style.display='flex';updateRoundDisplay();updateCoinDisplay();initGame();};
document.getElementById('shopBtn').onclick=()=>{document.getElementById('mainMenu').style.display='none';document.getElementById('shop').style.display='block';initShop();};
window.addEventListener('keydown',e=>gs.keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>gs.keys[e.key.toLowerCase()]=false);
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
<\/script>
</body>
</html>`;

const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];
function resizeCanvas() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
class Particle {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = init ? Math.random() * pCanvas.width : -8;
    this.y = Math.random() * pCanvas.height;
    this.baseY = this.y;
    this.size = Math.random() * 1.5 + 0.4;
    this.speed = Math.random() * 0.6 + 0.2;
    this.alpha = Math.random() * 0.5 + 0.15;
    this.waveAmp = Math.random() * 18 + 6;
    this.waveFreq = Math.random() * 0.018 + 0.008;
    this.wavePhase = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.speed;
    this.y = this.baseY + Math.sin(this.x * this.waveFreq + this.wavePhase) * this.waveAmp;
    if (this.x > pCanvas.width + 8) this.reset(false);
  }
  draw() {
    pCtx.globalAlpha = this.alpha;
    pCtx.fillStyle = '#00aaff';
    pCtx.shadowBlur = 6;
    pCtx.shadowColor = '#00aaff';
    pCtx.beginPath();
    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    pCtx.fill();
    pCtx.shadowBlur = 0;
  }
}
for (let i = 0; i < 120; i++) particles.push(new Particle());
function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  pCtx.globalAlpha = 1;
  particles.forEach(p => { p.update(); p.draw(); });
  pCtx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();

}

function openGameInModal(name, htmlContent) {
  document.getElementById('gameTitle').textContent = name;
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('src');
  frame.srcdoc = htmlContent;
  document.getElementById('gameModal').classList.add('show');
}
function openGameUrl(name, url) {
  document.getElementById('gameTitle').textContent = name;
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('srcdoc');
  frame.src = url;
  document.getElementById('gameModal').classList.add('show');
}
function openNoahGame(g) {
  const win = window.open('about:blank', '_blank');
  if (!win) { window.open(g.url, '_blank'); return; }
  fetch(g.url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(t => { win.document.open(); win.document.write(t); win.document.close(); })
    .catch(() => {
      win.document.open();
      win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body,html{width:100%;height:100%;overflow:hidden}iframe{border:none;width:100vw;height:100vh}</style></head><body><iframe src="' + g.url + '" allowfullscreen allow="autoplay"></iframe></body></html>');
      win.document.close();
    });
}
function sortGames(list) {
  const s = document.getElementById('gamesSort') ? document.getElementById('gamesSort').value : 'default';
  const l = [...list];
  if (s === 'z-a') l.sort((a,b) => b.name.localeCompare(a.name));
  else l.sort((a,b) => a.name.localeCompare(b.name));
  return l;
}
function buildGrid(grid, customList, noahList, apiList, marcusList) {
  marcusList = marcusList || (typeof MARCUS_GAMES !== "undefined" ? MARCUS_GAMES : []);
  grid.innerHTML = '';
  const all = [
    ...customList.map(g => ({...g, _type:'custom'})),
    ...noahList.map(g => ({...g, _type:'noah'})),
    ...apiList.map(g => ({...g, _type:'api'})),
    ...marcusList.map(g => ({...g, _type:'marcus'}))
  ];
  const sorted = sortGames(all);
  sorted.forEach((g, idx) => {
    let card;
    if (g._type === 'api') {
      const coverUrl = g.cover ? g.cover.replace('{COVER_URL}', COVER_BASE).replace('{HTML_URL}', HTML_BASE) : '';
      const gameUrl = g.url.replace('{HTML_URL}', HTML_BASE);
      card = makeCard(g.name, coverUrl);
      card.onclick = () => openGameModalFetch(g.name, gameUrl);
    } else if (g._type === 'noah') {
      card = makeCard(g.name, g.img);
      card.onclick = () => openNoahGame(g);
    } else if (g._type === 'marcus') {
      card = makeCard(g.name, g.img);
      card.onclick = () => openGameModalFetch(g.name, g.url);
    } else {
      card = makeCard(g.name, g.img);
      if (g.html) card.onclick = () => openGameInModal(g.name, g.html);
      else card.onclick = () => openGameUrl(g.name, g.url);
    }
    if (idx === 0) card.classList.add('featured');
    grid.appendChild(card);
  });
  if (grid.children.length === 0) { grid.innerHTML = '<div style="color:#7ab3f5;padding:20px;">No games found.</div>'; }
}
function renderGames(apiList) { buildGrid(document.getElementById('gamesGrid'), CUSTOM_GAMES, NOAH_GAMES, apiList, MARCUS_GAMES); }
function loadGames() {
  if (gamesLoaded) return;
  gamesLoaded = true;
  fetch(ZONES_URL + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      allApiGames = data.filter(g => !g.name.toLowerCase().includes('suggest') && !g.name.includes('[!]'));
      document.getElementById('gamesTotal').textContent = (CUSTOM_GAMES.length + NOAH_GAMES.length + MARCUS_GAMES.length + allApiGames.length) + ' games';
      renderGames(allApiGames);
    })
    .catch(() => {
      document.getElementById('gamesTotal').textContent = (CUSTOM_GAMES.length + NOAH_GAMES.length + MARCUS_GAMES.length) + ' games';
      renderGames([]);
    });
}
function searchGames(query) {
  const q = (query||'').trim().toLowerCase();
  const fc = q ? CUSTOM_GAMES.filter(g => g.name.toLowerCase().includes(q)) : CUSTOM_GAMES;
  const fn = q ? NOAH_GAMES.filter(g => g.name.toLowerCase().includes(q)) : NOAH_GAMES;
  const fa = q ? allApiGames.filter(g => g.name.toLowerCase().includes(q)) : allApiGames;
  const fm = q ? MARCUS_GAMES.filter(g => g.name.toLowerCase().includes(q)) : MARCUS_GAMES;
  document.getElementById('gamesTotal').textContent = (fc.length + fn.length + fa.length + fm.length) + ' games';
  buildGrid(document.getElementById('gamesGrid'), fc, fn, fa, fm);
}
function makeCard(name, imgUrl) {
  const card = document.createElement('div');
  card.className = 'game-card';
  const imgDiv = document.createElement('div');
  imgDiv.className = 'game-card-img';
  if (imgUrl) imgDiv.style.backgroundImage = 'url(' + imgUrl + ')';
  const title = document.createElement('div');
  title.className = 'game-card-title';
  title.textContent = name;
  card.appendChild(imgDiv);
  card.appendChild(title);
  return card;
}
function openGameModalFetch(name, url) {
  document.getElementById('gameTitle').textContent = name;
  document.getElementById('gameModal').classList.add('show');
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('src');
  frame.srcdoc = '<div style="color:#4285F4;font-size:20px;display:flex;align-items:center;justify-content:center;height:100%;background:#000">Loading...</div>';
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => { frame.srcdoc = html; })
    .catch(() => { frame.srcdoc = '<div style="color:red;font-size:20px;display:flex;align-items:center;justify-content:center;height:100%;background:#000">Failed to load game.</div>'; });
}
function closeGameModal() {
  document.getElementById('gameModal').classList.remove('show');
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('srcdoc');
  frame.src = '';
}
function openMovies(type) {
  document.getElementById('moviesMenu').style.display = 'none';
  document.getElementById('moviesEmbed').style.display = 'flex';
  const frame = document.getElementById('moviesFrame');
  const label = document.getElementById('moviesBtnLabel');
  if (type === 'media') {
    label.textContent = 'TV / Movies';
    frame.removeAttribute('src');
    frame.srcdoc = MEDIA_HTML;
  } else {
    label.textContent = 'Live TV';
    frame.removeAttribute('srcdoc');

  }
}
function closeMovies() {
  document.getElementById('moviesEmbed').style.display = 'none';
  document.getElementById('moviesMenu').style.display = 'flex';
  const mf = document.getElementById('moviesFrame');
  mf.removeAttribute('srcdoc');
  mf.src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGameModal(); });
const gamesPC = document.getElementById('gamesParticleCanvas');
const gamesPCtx = gamesPC.getContext('2d');
const gWrap = document.getElementById('gamesSectionWrapper');
function resizeGPC() { gamesPC.width = gWrap.offsetWidth; gamesPC.height = gWrap.offsetHeight; }
resizeGPC();
window.addEventListener('resize', resizeGPC);
const gDots = [];
for (let i = 0; i < 160; i++) {
  gDots.push({
    x: Math.random() * (gWrap.offsetWidth||1200),
    y: Math.random() * (gWrap.offsetHeight||800),
    baseY: 0,
    size: Math.random() * 2.2 + 0.5,
    speed: Math.random() * 0.9 + 0.3,
    alpha: Math.random() * 0.55 + 0.15,
    wA: Math.random() * 22 + 8,
    wF: Math.random() * 0.016 + 0.006,
    wP: Math.random() * Math.PI * 2
  });
}
gDots.forEach(d => { d.baseY = d.y; });
function animGDots() {
  gamesPCtx.clearRect(0, 0, gamesPC.width, gamesPC.height);
  gDots.forEach(d => {
    d.x += d.speed;
    d.y = d.baseY + Math.sin(d.x * d.wF + d.wP) * d.wA;
    if (d.x > gamesPC.width + 8) { d.x = -8; d.baseY = Math.random() * gamesPC.height; d.y = d.baseY; }
    gamesPCtx.globalAlpha = d.alpha;
    gamesPCtx.fillStyle = '#00aaff';
    gamesPCtx.shadowBlur = 7;
    gamesPCtx.shadowColor = '#00aaff';
    gamesPCtx.beginPath();
    gamesPCtx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
    gamesPCtx.fill();
    gamesPCtx.shadowBlur = 0;
  });
  gamesPCtx.globalAlpha = 1;
  requestAnimationFrame(animGDots);
}
animGDots();
