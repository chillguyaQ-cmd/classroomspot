<script>
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 3 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.life = Math.random() * 0.7 + 0.3;
    this.decay = 0.003 + Math.random() * 0.004;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    this.speedY += 0.008;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = '#4285F4';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

for (let i = 0; i < 80; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

function showSection(id, btn) {
  document.querySelectorAll('.content-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'games') loadGames();
  if (id !== 'movies') { document.getElementById('moviesMenu').style.display = 'flex'; document.getElementById('moviesEmbed').style.display = 'none'; document.getElementById('moviesFrame').src = ''; }
}

</head>
<body>
<div id="mainMenu">

<script>
const canvas=document.getElementById('gameCanvas');const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;
const playerImg=new Image();playerImg.crossOrigin="anonymous";playerImg.src='https://tse2.mm.bing.net/th/id/OIP.89OCW3QR_4RuPGPzLorffwAAAA?pid=ImgDet&w=197&h=197&c=7&o=7&rm=3';
const monsterImg=new Image();monsterImg.crossOrigin="anonymous";monsterImg.src='https://tse4.mm.bing.net/th/id/OIP.k0M8bXrS6QH-pzIFTnVVXgHaLG?pid=ImgDet&w=197&h=295&c=7&o=7&rm=3';
const bartmanImg=new Image();bartmanImg.crossOrigin="anonymous";bartmanImg.src='https://vignette.wikia.nocookie.net/simpsons/images/1/12/Bartman_Tapped_Out.png/revision/latest?cb=20151122175055';
const bart3dImg=new Image();bart3dImg.crossOrigin="anonymous";bart3dImg.src='https://th.bing.com/th/id/OIP.pHOZGFOlqL5Va6SwwaQSLQHaEK?w=291&h=181&c=7&r=0&o=7&pid=1.7&rm=3';
const mogBartImg=new Image();mogBartImg.crossOrigin="anonymous";mogBartImg.src='https://tse1.explicit.bing.net/th/id/OIP.WAoL4wWR3ePBTVrSQHXU9gAAAA?pid=ImgDet&w=165&h=350&c=7&o=7&rm=3';
let gameState={coins:0,round:1,isMonster:false,kills:0,selectedSkin:'default',ownedSkins:['default'],gameRunning:false,player:null,bots:[],monster:null,keys:{},camera:{x:0,y:0},trees:[]};
const skins={default:{name:'Default Bart',price:0,img:playerImg},bartman:{name:'Bartman',price:60,img:bartmanImg},bart3d:{name:'3D Bart',price:50,img:bart3dImg},mogbart:{name:'I Mog You Bart',price:100,img:mogBartImg}};
function initTrees(){gameState.trees=[];for(let i=0;i<50;i++){gameState.trees.push({x:Math.random()*3000-1500,y:Math.random()*3000-1500,size:40+Math.random()*40});}}
class Entity{constructor(x,y,size,speed,img){this.x=x;this.y=y;this.size=size;this.speed=speed;this.img=img;this.vx=0;this.vy=0;this.angle=0;}
draw(ctx,cameraX,cameraY){const screenX=this.x-cameraX+canvas.width/2;const screenY=this.y-cameraY+canvas.height/2;ctx.save();ctx.translate(screenX,screenY);if(this.vx<0){ctx.scale(-1,1);}const aspectRatio=this.img.width/this.img.height;const drawWidth=this.size*aspectRatio;const drawHeight=this.size;ctx.drawImage(this.img,-drawWidth/2,-drawHeight/2,drawWidth,drawHeight);ctx.restore();}
update(){this.x+=this.vx;this.y+=this.vy;const boundary=1400;this.x=Math.max(-boundary,Math.min(boundary,this.x));this.y=Math.max(-boundary,Math.min(boundary,this.y));if(this.vx!==0||this.vy!==0){this.angle=Math.atan2(this.vy,this.vx);}}}
class Player extends Entity{constructor(){super(0,0,60,5,playerImg);this.isMonster=false;}
update(){this.vx=0;this.vy=0;if(gameState.keys['w']||gameState.keys['arrowup'])this.vy=-this.speed;if(gameState.keys['s']||gameState.keys['arrowdown'])this.vy=this.speed;if(gameState.keys['a']||gameState.keys['arrowleft'])this.vx=-this.speed;if(gameState.keys['d']||gameState.keys['arrowright'])this.vx=this.speed;if(this.vx!==0&&this.vy!==0){this.vx*=0.707;this.vy*=0.707;}super.update();}}
class Bot extends Entity{constructor(x,y,isMonster=false){super(x,y,isMonster?80:60,isMonster?6:4,isMonster?monsterImg:playerImg);this.isMonster=isMonster;this.changeDirTimer=0;this.targetX=0;this.targetY=0;this.fleeing=false;}
update(player,monster){const dx=player.x-this.x;const dy=player.y-this.y;const dist=Math.sqrt(dx*dx+dy*dy);if(this.isMonster){if(dist<400&&!player.isMonster){this.vx=(dx/dist)*this.speed;this.vy=(dy/dist)*this.speed;}else{this.changeDirTimer--;if(this.changeDirTimer<=0){this.targetX=(Math.random()-0.5)*2000;this.targetY=(Math.random()-0.5)*2000;this.changeDirTimer=60+Math.random()*60;}const tdx=this.targetX-this.x;const tdy=this.targetY-this.y;const tdist=Math.sqrt(tdx*tdx+tdy*tdy);if(tdist>10){this.vx=(tdx/tdist)*this.speed*0.5;this.vy=(tdy/tdist)*this.speed*0.5;}}}else{if(monster&&dist<300){this.fleeing=true;this.vx=(-dx/dist)*(this.speed*1.5);this.vy=(-dy/dist)*(this.speed*1.5);}else{this.fleeing=false;this.changeDirTimer--;if(this.changeDirTimer<=0){const angle=Math.random()*Math.PI*2;this.vx=Math.cos(angle)*this.speed;this.vy=Math.sin(angle)*this.speed;this.changeDirTimer=30+Math.random()*60;}}}super.update();}}
function initGame(){gameState.player=new Player();gameState.bots=[];gameState.monster=null;gameState.kills=0;const botCount=5+gameState.round*2;if(gameState.isMonster){gameState.player.isMonster=true;gameState.player.img=monsterImg;gameState.player.size=80;gameState.player.speed=6;document.getElementById('monsterOverlay').style.display='block';document.getElementById('roleDisplay').textContent='MONSTER';document.getElementById('roleDisplay').style.color='#f44336';for(let i=0;i<botCount;i++){const angle=(Math.PI*2*i)/botCount;const dist=600+Math.random()*400;const x=Math.cos(angle)*dist;const y=Math.sin(angle)*dist;gameState.bots.push(new Bot(x,y,false));}}else{gameState.player.isMonster=false;gameState.player.img=skins[gameState.selectedSkin].img;gameState.player.size=60;gameState.player.speed=5;document.getElementById('monsterOverlay').style.display='none';document.getElementById('roleDisplay').textContent='RUNNER';document.getElementById('roleDisplay').style.color='#4caf50';const monsterBot=new Bot(800,800,true);gameState.monster=monsterBot;gameState.bots.push(monsterBot);for(let i=0;i<botCount-1;i++){const angle=(Math.PI*2*i)/(botCount-1);const dist=400+Math.random()*300;const x=Math.cos(angle)*dist;const y=Math.sin(angle)*dist;gameState.bots.push(new Bot(x,y,false));}gameState.bots.push(gameState.player);}initTrees();gameState.gameRunning=true;gameLoop();}
function checkCollisions(){if(gameState.isMonster){for(let i=gameState.bots.length-1;i>=0;i--){const bot=gameState.bots[i];const dx=gameState.player.x-bot.x;const dy=gameState.player.y-bot.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<50){gameState.bots.splice(i,1);gameState.kills++;if(gameState.kills>=10){showVictory();return;}}}if(gameState.bots.length===0){showVictory();}}else{if(gameState.monster){const dx=gameState.player.x-gameState.monster.x;const dy=gameState.player.y-gameState.monster.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<50){playerDied();}}}}
function showVictory(){gameState.gameRunning=false;const msg=document.getElementById('victoryMessage');msg.style.display='block';if(gameState.isMonster){gameState.coins+=10;updateCoinDisplay();}setTimeout(()=>{msg.style.display='none';gameState.round++;gameState.isMonster=(gameState.round%3===0);updateRoundDisplay();initGame();},2000);}
function playerDied(){gameState.gameRunning=false;document.getElementById('deathRound').textContent=gameState.round;document.getElementById('deathCoins').textContent=gameState.coins;document.getElementById('deathScreen').style.display='flex';}
function returnToMenu(){document.getElementById('deathScreen').style.display='none';document.getElementById('gameCanvas').style.display='none';document.getElementById('gameUI').style.display='none';document.getElementById('mainMenu').style.display='flex';gameState.round=1;gameState.isMonster=false;updateRoundDisplay();}
function gameLoop(){if(!gameState.gameRunning)return;ctx.fillStyle='#1a472a';ctx.fillRect(0,0,canvas.width,canvas.height);gameState.player.update();gameState.camera.x=gameState.player.x;gameState.camera.y=gameState.player.y;ctx.save();ctx.translate(canvas.width/2-gameState.camera.x,canvas.height/2-gameState.camera.y);ctx.fillStyle='#0d3320';ctx.fillRect(-1500,-1500,3000,3000);for(const tree of gameState.trees){ctx.fillStyle='#0f3d0f';ctx.beginPath();ctx.arc(tree.x,tree.y-tree.size/2,tree.size/2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a3728';ctx.fillRect(tree.x-8,tree.y-10,16,25);}ctx.restore();for(const bot of gameState.bots){if(bot!==gameState.player){bot.update(gameState.player,gameState.monster);}bot.draw(ctx,gameState.camera.x,gameState.camera.y);}gameState.player.draw(ctx,gameState.camera.x,gameState.camera.y);checkCollisions();requestAnimationFrame(gameLoop);}
function updateRoundDisplay(){document.getElementById('roundDisplay').textContent=gameState.round;document.getElementById('monsterRoundDisplay').textContent=(3-(gameState.round%3))%3||3;}
function updateCoinDisplay(){document.getElementById('gameCoins').textContent=gameState.coins;document.getElementById('shopCoins').textContent=gameState.coins;}
function showMainMenu(){document.getElementById('shop').style.display='none';document.getElementById('mainMenu').style.display='flex';}
function initShop(){const grid=document.getElementById('skinsGrid');grid.innerHTML='';for(const[id,skin]of Object.entries(skins)){const card=document.createElement('div');card.className='skin-card';if(gameState.ownedSkins.includes(id)){card.classList.add('owned');if(gameState.selectedSkin===id){card.classList.add('selected');}}const img=document.createElement('img');img.className='skin-img';img.src=skin.img.src;const name=document.createElement('div');name.className='skin-name';name.textContent=skin.name;const price=document.createElement('div');if(gameState.ownedSkins.includes(id)){price.className='skin-owned-text';price.textContent=gameState.selectedSkin===id?'SELECTED':'OWNED';}else{price.className='skin-price';price.textContent=skin.price+' Coins';}card.appendChild(img);card.appendChild(name);card.appendChild(price);card.onclick=()=>buySkin(id);grid.appendChild(card);}updateCoinDisplay();}
function buySkin(skinId){const skin=skins[skinId];if(gameState.ownedSkins.includes(skinId)){gameState.selectedSkin=skinId;initShop();return;}if(gameState.coins>=skin.price){gameState.coins-=skin.price;gameState.ownedSkins.push(skinId);gameState.selectedSkin=skinId;updateCoinDisplay();initShop();}else{alert('Not enough coins!');}}
document.getElementById('playBtn').onclick=()=>{document.getElementById('mainMenu').style.display='none';document.getElementById('gameCanvas').style.display='block';document.getElementById('gameUI').style.display='flex';updateRoundDisplay();updateCoinDisplay();initGame();};
document.getElementById('shopBtn').onclick=()=>{document.getElementById('mainMenu').style.display='none';document.getElementById('shop').style.display='block';initShop();};
window.addEventListener('keydown',(e)=>{gameState.keys[e.key.toLowerCase()]=true;});
window.addEventListener('keyup',(e)=>{gameState.keys[e.key.toLowerCase()]=false;});
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
<\/script>
</body>
</html>`;

const ZONES_URL = "https://cdn.jsdelivr.net/gh/gn-math/assets@main/zones.json";
const COVER_BASE = "https://cdn.jsdelivr.net/gh/gn-math/covers@main/";
const HTML_BASE = "https://cdn.jsdelivr.net/gh/gn-math/html@main/";

let gamesLoaded = false;
let allApiGames = [];

function openNoahGame(g) {
  const win = window.open("about:blank", "_blank");
  if (!win) { window.open(g.url, '_blank'); return; }
  fetch(g.url)
    .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
    .then(t => { win.document.open(); win.document.write(t); win.document.close(); })
    .catch(() => {
      win.document.open();
      win.document.write('<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body,html{width:100%;height:100%;overflow:hidden}iframe{border:none;width:100vw;height:100vh}</style></head><body><iframe src="' + g.url + '" allowfullscreen allow="autoplay"></iframe></body></html>');
      win.document.close();
    });
}

function loadGames() {
  if (gamesLoaded) return;
  gamesLoaded = true;
  fetch(ZONES_URL + "?t=" + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      allApiGames = data.filter(g => !g.name.toLowerCase().includes("suggest") && !g.name.includes("[!]"));
      document.getElementById('gamesTotal').textContent = "Total games: " + (CUSTOM_GAMES.length + NOAH_GAMES.length + allApiGames.length);
      renderGames(allApiGames);
    })
    .catch(() => {
      document.getElementById('gamesTotal').textContent = "Total games: " + (CUSTOM_GAMES.length + NOAH_GAMES.length);
      renderGames([]);
    });
}

function buildGrid(grid, customList, noahList, apiList) {
  grid.innerHTML = '';
  customList.forEach(g => {
    if (g.html) {
      grid.appendChild(makeCard(g.name, g.img, () => openGameModalSrcdoc(g.name, g.html)));
    } else {
      grid.appendChild(makeCard(g.name, g.img, () => openGameModalUrl(g.name, g.url)));
    }
  });
  apiList.forEach(g => {
    const coverUrl = g.cover ? g.cover.replace("{COVER_URL}", COVER_BASE).replace("{HTML_URL}", HTML_BASE) : '';
    const gameUrl = g.url.replace("{HTML_URL}", HTML_BASE);
    grid.appendChild(makeCard(g.name, coverUrl, () => openGameModalFetch(g.name, gameUrl)));
  });
  noahList.forEach(g => {
    grid.appendChild(makeCard(g.name, g.img, () => openNoahGame(g)));
  });
  if (grid.children.length === 0) {
    const msg = document.createElement('div');
    msg.className = 'games-empty';
    msg.textContent = 'No games found.';
    grid.appendChild(msg);
  }
}

function renderGames(apiList) {
  buildGrid(document.getElementById('gamesGrid'), CUSTOM_GAMES, NOAH_GAMES, apiList);
}

function searchGames(query) {
  const q = query.trim().toLowerCase();
  const filteredCustom = q ? CUSTOM_GAMES.filter(g => g.name.toLowerCase().includes(q)) : CUSTOM_GAMES;
  const filteredNoah = q ? NOAH_GAMES.filter(g => g.name.toLowerCase().includes(q)) : NOAH_GAMES;
  const filteredApi = q ? allApiGames.filter(g => g.name.toLowerCase().includes(q)) : allApiGames;
  document.getElementById('gamesTotal').textContent = "Total games: " + (filteredCustom.length + filteredNoah.length + filteredApi.length);
  buildGrid(document.getElementById('gamesGrid'), filteredCustom, filteredNoah, filteredApi);
}

function makeCard(name, imgUrl, onClick) {
  const card = document.createElement('div');
  card.className = 'game-card';
  if (imgUrl) card.style.backgroundImage = 'url(' + imgUrl + ')';
  card.onclick = onClick;
  const title = document.createElement('div');
  title.className = 'game-card-title';
  title.textContent = name;
  card.appendChild(title);
  return card;
}

function openGameModalSrcdoc(name, html) {
  document.getElementById('gameTitle').textContent = name;
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('src');
  frame.srcdoc = html;
  document.getElementById('gameModal').classList.add('show');
}

function openGameModalUrl(name, url) {
  document.getElementById('gameTitle').textContent = name;
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('srcdoc');
  frame.src = url;
  document.getElementById('gameModal').classList.add('show');
}

function openGameModalFetch(name, url) {
  document.getElementById('gameTitle').textContent = name;
  document.getElementById('gameModal').classList.add('show');
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('src');
  frame.srcdoc = '<div style="color:#4285F4;font-size:20px;display:flex;align-items:center;justify-content:center;height:100%;background:#000">Loading...</div>';
  fetch(url)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(html => { frame.srcdoc = html; })
    .catch(() => { frame.srcdoc = '<div style="color:red;font-size:20px;display:flex;align-items:center;justify-content:center;height:100%;background:#000">Failed to load game.</div>'; });
}

function closeGameModal() {
  document.getElementById('gameModal').classList.remove('show');
  const frame = document.getElementById('gameFrame');
  frame.removeAttribute('srcdoc');
  frame.src = '';
}

function openMovies(type) {
  const urls = { tv: 'https://ilovereading.b-cdn.net/streaming.html', livetv: 'https://famelack.com' };
  const labels = { tv: 'TV', livetv: 'Live TV' };
  document.getElementById('moviesMenu').style.display = 'none';
  document.getElementById('moviesEmbed').style.display = 'flex';
  document.getElementById('moviesFrame').src = urls[type];
  document.getElementById('moviesBtnLabel').textContent = labels[type];
}
function closeMovies() {
  document.getElementById('moviesEmbed').style.display = 'none';
  document.getElementById('moviesMenu').style.display = 'flex';
  document.getElementById('moviesFrame').src = '';
}

function openSettings() {
  document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
  document.getElementById('modalOverlay').classList.add('show');
}
function closeSettings() { document.getElementById('modalOverlay').classList.remove('show'); }
function applyCloaking() { document.title = document.getElementById('cloakInput').value.trim() || 'Google Classroom'; }
function openBlankTab() { window.open('about:blank', '_blank'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeGameModal(); });
</script>
