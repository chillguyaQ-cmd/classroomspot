<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>afterlife♡</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { cursor: none !important; box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #0d2a5e 25%, #1a4a8a 50%, #2196c4 75%, #56c8e8 100%);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Cursor */
#cursor {
  position: fixed;
  width: 12px; height: 12px;
  background: #00d4ff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 6px #00d4ff, 0 0 12px #00d4ff, 0 0 24px #00aaff, 0 0 40px #0088ff;
}

/* Particles */
#particles-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
}

/* Hub */
.hub {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; gap: 28px;
}

/* Title */
.title {
  font-size: clamp(2.6rem, 7vw, 5rem);
  font-weight: 700;
  letter-spacing: 0.06em;
  background: linear-gradient(135deg, #fff 0%, #a8e6ff 40%, #00d4ff 70%, #0088ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 28px rgba(0,180,255,0.55));
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { filter: drop-shadow(0 0 18px rgba(0,180,255,0.45)); }
  50%      { filter: drop-shadow(0 0 48px rgba(0,210,255,0.9)); }
}

/* Clock card */
.card {
  background: rgba(255,255,255,0.09);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 24px;
  padding: 28px 38px;
  width: 320px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
}

#clock {
  font-size: 2.2rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.04em;
}

#date {
  margin-top: 6px;
  font-size: 1rem;
  font-weight: 500;
  color: rgba(180,230,255,0.85);
}

.widget-row {
  margin-top: 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 1rem;
  font-weight: 700;
  color: #e0f4ff;
}

#battery, #weather { display: flex; align-items: center; gap: 8px; }

/* Game controller button */
.game-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  transition: transform 0.2s ease;
}
.game-btn:hover { transform: scale(1.12); }

.game-icon {
  width: 72px; height: 72px;
  background: rgba(255,255,255,0.09);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(0,212,255,0.35);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px rgba(0,180,255,0.25), 0 4px 20px rgba(0,0,0,0.25);
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}
.game-btn:hover .game-icon {
  box-shadow: 0 0 30px rgba(0,210,255,0.6), 0 4px 20px rgba(0,0,0,0.3);
  border-color: rgba(0,212,255,0.75);
}

.game-icon i {
  font-size: 2rem;
  background: linear-gradient(135deg, #a8e6ff, #00d4ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.game-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(150, 210, 255, 0.65);
}
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="particles-canvas"></canvas>

<div class="hub">

  <!-- Title -->
  <h1 class="title">afterlife♡</h1>

  <!-- Clock -->
  <div class="card">
    <div id="clock">00:00:00 AM</div>
    <div id="date">Loading...</div>
    <div class="widget-row">
      <div id="battery">
        <span id="battery-icon" class="fas fa-battery-three-quarters" style="color:#4ade80;"></span>
        <span id="battery-level">—%</span>
      </div>
      <div id="weather">
        <i class="fas fa-temperature-half" style="opacity:.8;"></i>
        <span id="temp-val">—°F</span>
      </div>
    </div>
  </div>

  <!-- Game Controller Button -->
  <a href="https://games67.vercel.app/games.html" class="game-btn" target="_blank" rel="noopener noreferrer">
    <div class="game-icon">
      <i class="fas fa-gamepad"></i>
    </div>
    <span class="game-label">Games</span>
  </a>

</div>

<script>
/* Cursor */
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

/* Clock */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('date').textContent =
    now.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}
updateClock();
setInterval(updateClock, 1000);

/* Battery */
function updateBattery() {
  if ('getBattery' in navigator) {
    navigator.getBattery().then(b => {
      const lvl = Math.round(b.level * 100);
      const icon = document.getElementById('battery-icon');
      const lbl  = document.getElementById('battery-level');
      icon.className = lvl <= 10 ? 'fas fa-battery-empty' :
                       lvl <= 30 ? 'fas fa-battery-quarter' :
                       'fas fa-battery-three-quarters';
      icon.style.color = lvl <= 10 ? '#f87171' : lvl <= 30 ? '#fbbf24' : '#4ade80';
      lbl.textContent = lvl + '%';
    });
  } else {
    document.getElementById('battery-icon').className = 'fas fa-plug';
    document.getElementById('battery-level').textContent = 'N/A';
  }
}
updateBattery();
setInterval(updateBattery, 60000);

/* Weather */
function updateWeather() {
  const el = document.getElementById('temp-val');
  const fetch_ = (lat, lon) => {
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=fahrenheit`)
      .then(r => r.json())
      .then(d => { el.textContent = Math.round(d.current_weather.temperature) + '°F'; })
      .catch(() => { el.textContent = 'N/A'; });
  };
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      p => fetch_(p.coords.latitude, p.coords.longitude),
      ()  => fetch_(34.58, -117.40)
    );
  } else { fetch_(34.58, -117.40); }
}
updateWeather();
setInterval(updateWeather, 600000);

/* Particles */
(function() {
  const c = document.getElementById('particles-canvas');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  window.addEventListener('resize', resize); resize();
  const COLS = ['#00d4ff','#56c8e8','#a8e6ff','#0088ff','#4db8ff','#fff'];
  class P {
    constructor(init) {
      this.x = Math.random() * (W || 800);
      this.y = init ? Math.random() * (H || 600) : (H + 10);
      this.r  = Math.random() * 2.2 + 0.4;
      this.vx = (Math.random() - 0.5) * 0.35;
      this.vy = -(Math.random() * 0.55 + 0.15);
      this.a  = Math.random() * 0.65 + 0.15;
      this.da = (Math.random() * 0.018 + 0.004) * (Math.random() > 0.5 ? 1 : -1);
      this.col= COLS[Math.floor(Math.random()*COLS.length)];
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      this.a += this.da;
      if (this.a > 0.82 || this.a < 0.05) this.da *= -1;
      if (this.y < -10) { this.x = Math.random()*W; this.y = H+10; }
    }
    draw() {
      ctx.save(); ctx.globalAlpha = this.a;
      ctx.fillStyle = this.col;
      ctx.shadowColor = this.col; ctx.shadowBlur = this.r * 4;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  for (let i=0;i<180;i++) pts.push(new P(true));
  (function loop() {
    ctx.clearRect(0,0,W,H);
    pts.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
